    <form class="register-form" action="index2.html" method="get">
        <div>
            <h1>Regisztráció</h1> 
            <p class="info">A pokol hetének tréningjéhez elhagyhatatlan!<p>
        </div>
        <div>
            <label for="username">Felhasználónév</label>
            <input type="text" id="username" name="text" placeholder="Add meg a felhasználónevet!" required>
        </div>
        <div>
            <label for="email">E-mail cím</label>
            <input type="email" id="email" name="email" placeholder="Add meg az e-mail címedet!" required>
        </div>
        <div>
            <label for="tel">Telefonszám</label>
            <input type="number" id="tel" name="tel" placeholder="Add meg a telefonszámod!" required>
        </div>
        <div>
            <label for="password">Jelszó</label>
            <input type="password" id="password" name="password" placeholder="Válassz egy legalább 18 karakterből álló jelszót!" required>
        </div>
        <div>
            <label>Válaszd ki a nemed!</label>
            <label>
                <input type="radio" name="gender" value="male">Férfi
            </label>
            <label>
                <input type="radio" name="gender" value="female">Nő
            </label>
            <label>
                <input type="radio" name="gender" value="other">Egyéb
            </label>
        </div>
        <div>
            <label for="date">Születési dátum</label>
            <input type="datetime-local" id="date" name="date"> 
        </div>
        <div>
            <label>Hozzájárulások</label>
            <label>
                <input type="checkbox" required>Elfogadom a felhasználási feltételeket
            </label>
            <label>
                <input type="checkbox">Szeretnék e-mailben értesítést kapni a legújabb edzés tervekről
            </label>
            <label>
                <input type="checkbox">Szeretném ha másnaposan hívogatna a boltvezető
            </label>
        </div>
        <div>
            <input type="submit" value="Regisztráció">
        </div>
    </form>
